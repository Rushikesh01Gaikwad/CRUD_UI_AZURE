<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Teacher</h3>

    <button
      class="btn btn-primary"
      data-bs-toggle="modal"
      data-bs-target="#teacherModal"
    >
      Add Teacher
    </button>
  </div>

  <table class="table table-hover table-bordered shadow-sm">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Remark</th>
        <th>Department</th>
        <th width="140">Action</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let teacher of teachers; let i = index">
        <td>{{ i + 1 }}</td>
        <td>{{ teacher.Name }}</td>
        <td>{{ teacher.Remark }}</td>

        <td>
          <span class="badge bg-info">
            {{ teacher.Department?.Name }}
          </span>
        </td>

        <td>
          <button
            class="btn btn-sm btn-warning me-2"
            (click)="editTeacher(teacher, i)"
          >
            <i class="bi bi-pencil-square"></i>
          </button>

          <button class="btn btn-sm btn-danger" (click)="deleteTeacher(i)">
            <i class="bi bi-trash"></i>
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<!-- Modal -->

<div class="modal fade" id="teacherModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title">Add Teacher</h5>

        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Teacher Name</label>

          <input type="text" class="form-control" [(ngModel)]="teacher.Name" />
        </div>

        <div class="mb-3">
          <label class="form-label">Remark</label>

          <input
            type="text"
            class="form-control"
            [(ngModel)]="teacher.Remark"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Department</label>

          <select class="form-select" [(ngModel)]="teacher.DepartmentId">
            <option value="">Select Department</option>

            <option *ngFor="let dept of departments" [value]="dept.Id">
              {{ dept.Name }}
            </option>
          </select>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">
          Cancel
        </button>

        <button
          class="btn btn-primary"
          (click)="saveTeacher()"
          data-bs-dismiss="modal"
        >
          Save
        </button>
      </div>
    </div>
  </div>
</div>
