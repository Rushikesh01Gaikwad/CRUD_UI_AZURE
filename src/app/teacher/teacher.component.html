<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Teacher</h3>

    <button
      class="btn btn-primary"
      data-bs-toggle="modal"
      data-bs-target="#teacherModal"
      (click)="addTeacher()"
    >
      Add Teacher
    </button>
  </div>

  <table class="table table-hover table-bordered shadow-sm">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Remark</th>
        <th>Department</th>
        <th width="140">Action</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let teacher of teachers">
        <td>{{ teacher.id }}</td>
        <td>{{ teacher.name }}</td>
        <td>{{ teacher.remark }}</td>

        <td>
          <span class="badge bg-info">
            {{ teacher.department?.name }}
          </span>
        </td>

        <td>
          <button
            class="btn btn-sm btn-warning me-2"
            (click)="editTeacher(teacher, teacher.id)"
          >
            <i class="bi bi-pencil-square"></i>
          </button>

          <button
            class="btn btn-sm btn-danger"
            (click)="deleteTeacher(teacher.id)"
          >
            <i class="bi bi-trash"></i>
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<!-- Modal -->

<div class="modal fade" id="teacherModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title">
          @if (teacher.id) {
            Update
          } @else {
            Add
          }
          Teacher
        </h5>

        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Teacher Name</label>

          <input type="text" class="form-control" [(ngModel)]="teacher.name" />
        </div>

        <div class="mb-3">
          <label class="form-label">Remark</label>

          <input
            type="text"
            class="form-control"
            [(ngModel)]="teacher.remark"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Profile Image</label>

          <input
            type="file"
            class="form-control"
            (change)="onFileSelected($event)"
              #fileInput

          />

          <div class="text-center mt-2" *ngIf="imagePreview">
            <img
              [src]="imagePreview"
              width="100"
              height="100"
              class="rounded-circle border"
            />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Department</label>

          <select class="form-select" [(ngModel)]="teacher.departmentID">
            <option value="">Select Department</option>

            <option *ngFor="let dept of departments" [value]="dept.id">
              {{ dept.name }}
            </option>
          </select>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">
          Cancel
        </button>

        <button
          class="btn btn-primary"
          (click)="uploadImage()"
        >
          @if (teacher.id) {
            Update
          } @else {
            Save
          }
        </button>
      </div>
    </div>
  </div>
</div>
